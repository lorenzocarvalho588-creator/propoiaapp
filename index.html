<style>

  @keyframes sp{to{transform:rotate(360deg)}}
  @keyframes fu{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
  .fu{animation:fu .35s ease both}
  @keyframes sl{0%{margin-left:-40%}100%{margin-left:110%}}
  input,textarea,select{font-family:inherit}
  ::-webkit-scrollbar{width:7px}::-webkit-scrollbar-thumb{background:#2A4034;border-radius:8px}

  button:focus:not(:focus-visible){outline:none}
  @media (prefers-reduced-motion: reduce){*{animation-duration:.001ms!important;animation-iteration-count:1!important;transition:none!important}}
  @media print{
    .noprint{display:none!important}
    body{background:#fff;margin:0}
    #wrap{box-shadow:none!important;border-radius:0!important;max-width:100%!important}

const uid = () => Date.now().toString(36) + Math.random().toString(36).slice(2,6);

  const [menuOpen,setMenuOpen] = useState(false);
  const isMobile = window.innerWidth < 860;

  useEffect(()=>{ if(window.lucide) window.lucide.createIcons(); });
  useEffect(()=>{ try{ localStorage.setItem("propoai_proposals",JSON.stringify(proposals)); }catch(e){} },[proposals]);
  useEffect(()=>{ try{ localStorage.setItem("propoai_settings",JSON.stringify(settings)); }catch(e){} },[settings]);

  const saveProposal = (p) => { setProposals(prev => prev.some(x=>x.id===p.id) ? prev.map(x=>x.id===p.id?p:x) : [p,...prev]); setCurrent(p); };

  const openView = (p,track) => { if(track){ const up={...p,views:(p.views||0)+1,lastViewed:Date.now()}; setProposals(prev=>prev.map(x=>x.id===p.id?up:x)); setCurrent(up); } else setCurrent(p); };

  const nav = [
    {id:"dashboard",label:"Dashboard",icon:"layout-dashboard"},
    {id:"new",label:"Nova Proposta",icon:"plus-circle"},
    {id:"proposals",label:"Minhas Propostas",icon:"folder-open"},
    {id:"templates",label:"Templates",icon:"layout-template"},
    {id:"settings",label:"Configurações",icon:"settings"},
  ];

  if(view==="view" && current) return <ViewDoc proposal={current} settings={settings} back={()=>setView("proposals")} publish={saveProposal} goSettings={()=>setView("settings")}/>;

  return (
    <div style={{display:"flex",minHeight:"100vh"}}>
      {menuOpen && <div className="noprint" onClick={()=>setMenuOpen(false)} style={{position:"fixed",inset:0,background:"rgba(0,0,0,.5)",zIndex:40}}/>}

            <div style={{fontSize:11,color:"rgba(255,255,255,.4)",fontWeight:500}}>Propostas com IA</div>
          </div>
        </div>

        <div style={{fontSize:10,fontWeight:700,color:"rgba(255,255,255,.3)",letterSpacing:".1em",margin:"0 8px 10px",textTransform:"uppercase"}}>Menu</div>

        <nav style={{display:"flex",flexDirection:"column",gap:3}}>
          {nav.map(it=>{
            const a = view===it.id||(view==="editor"&&it.id==="proposals");
            return <button key={it.id} onClick={()=>{setView(it.id);setMenuOpen(false);}} className="hov"

              <div style={{width:32,height:32,borderRadius:9,

            <div style={{width:36,height:36,borderRadius:"50%",overflow:"hidden",boxShadow:"0 2px 8px rgba(0,0,0,.12)"}}>
              <img src={settings.logo||LOGO_SRC} style={{width:"100%",height:"100%",objectFit:"cover"}}/>
            </div>
          </div>

        <main style={{flex:1,padding:"28px clamp(16px,4vw,40px)"}}>
          {view==="dashboard" && <Dashboard proposals={proposals} go={setView} open={p=>{setCurrent(p);setView("editor");}}/>}
          {view==="new" && <NewProposal settings={settings} onCreated={p=>{saveProposal(p);setView("editor");}}/>}
          {view==="proposals" && <MyProposals proposals={proposals} edit={p=>{setCurrent(p);setView("editor");}} viewDoc={p=>{openView(p,false);setView("view");}} del={delProposal} go={setView}/>}

        </main>

}

function Dashboard({proposals,go,open}){
  const total=proposals.length, viewed=proposals.filter(p=>(p.views||0)>0).length;
  const approved=proposals.filter(p=>p.status==="approved").length;
  const rate=total?Math.round(approved/total*100):0;
  const stats=[
    {label:"Total de propostas",val:total,icon:"file-text",color:C.secondary},
    {label:"Visualizadas",val:viewed,icon:"eye",color:"#8B5CF6"},
    {label:"Aprovadas",val:approved,icon:"check-circle",color:"#10B981"},
    {label:"Taxa de aprovação",val:rate+"%",icon:"trending-up",color:C.success}
  ];
  const recent=[...proposals].sort((a,b)=>b.createdAt-a.createdAt).slice(0,6);
  return <div className="fu" style={{maxWidth:1000}}>
    {total===0 && <div style={{...card,padding:"36px",marginBottom:24,
      background:`linear-gradient(135deg,#0E2019 0%,#1B3A30 60%,#2E5A4C 100%)`,
      color:"#fff",border:"none",boxShadow:"0 16px 48px rgba(14,32,25,.4)",position:"relative",overflow:"hidden"}}>

      <h2 style={{margin:"0 0 10px",fontSize:24,fontWeight:800,position:"relative"}}>Bem-vindo ao PropostaIA 👋</h2>
      <p style={{margin:0,opacity:.88,fontSize:15.5,lineHeight:1.65,maxWidth:560,position:"relative"}}>
        Transforme informações simples em propostas comerciais profissionais em minutos. A IA escreve, você personaliza e impressiona seus clientes.
      </p>
      <button onClick={()=>go("new")} className="hov" style={{marginTop:22,background:"#fff",color:C.primary,border:"none",padding:"13px 24px",borderRadius:11,fontWeight:800,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:8,boxShadow:"0 6px 20px rgba(0,0,0,.2)",position:"relative"}}>
        <Icon n="sparkles" c={C.primary} s={17}/> Criar minha primeira proposta
      </button>
    </div>}

function NewProposal({settings,onCreated}){
  const [f,setF] = useState({clientName:"",company:"",template:"Marketing Digital",service:"",objective:"",scope:"",deadline:"",value:"",notes:""});
  const [loading,setLoading] = useState(false);
  const [err,setErr] = useState("");
  const set = k => e => setF({...f,[k]:e.target.value});

  const gen = async() => {
    if(!f.service.trim()){ setErr("Informe ao menos o serviço para gerar a proposta."); return; }
    setErr(""); setLoading(true);
    try{
      const res = await fetch("/.netlify/functions/generate",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({...f,companyName:settings.companyName})});
      if(!res.ok) throw new Error();
      const data = await res.json();
      if(!data.content) throw new Error();
      onCreated({id:uid(),...f,companyName:settings.companyName,createdAt:Date.now(),views:0,status:"draft",content:data.content});
    }catch(e){
      setLoading(false);
      setErr("Não foi possível gerar agora. Verifique se o app está publicado no Netlify com a chave da API configurada.");
    }
  };

  if(loading) return (
    <div className="fu" style={{textAlign:"center",marginTop:70}}>
      <div className="spin" style={{margin:"0 auto"}}/>

        <div style={{height:"100%",width:"40%",background:`linear-gradient(90deg,${C.secondary},${C.accent})`,borderRadius:100,animation:"sl 1.5s ease infinite"}}/>
      </div>
    </div>
  );

  return <div className="fu" style={{maxWidth:720}}>
    <div style={{marginBottom:24}}>
      <h2 style={{margin:"0 0 6px",fontSize:23,fontWeight:800,letterSpacing:"-0.5px"}}>Crie uma proposta profissional</h2>
      <p style={{color:C.textSec,margin:0,fontSize:14.5,lineHeight:1.65}}>Preencha as informações e a IA monta tudo em 30 segundos.</p>
    </div>
    <div style={{...card,padding:28}}>
      <Field l="Categoria / Template">
        <select value={f.template} onChange={set("template")} style={inp}>
          {TEMPLATES.map(t=><option key={t.id}>{t.id}</option>)}

      </Field>
      <div style={rowG}>

        <Field l="Empresa"><input value={f.company} onChange={set("company")} style={inp} placeholder="Ex.: Acme Ltda"/></Field>

      <Field l="Serviço *"><input value={f.service} onChange={set("service")} style={inp} placeholder="Ex.: Gestão de tráfego pago para e-commerce"/></Field>
      <Field l="Objetivo"><input value={f.objective} onChange={set("objective")} style={inp} placeholder="Ex.: Aumentar vendas online em 40%"/></Field>
      <Field l="Escopo"><textarea value={f.scope} onChange={set("scope")} rows={3} style={{...inp,resize:"vertical"}} placeholder="Descreva o que será entregue..."/></Field>

        }}/>
      </div>

function EL({l,items=[],on}){
  const u=(i,v)=>{const a=[...(items||[])];a[i]=v;on(a);};
  return <div style={{marginBottom:13}}>
    <label style={lab}>{l}</label>
    {(items||[]).map((it,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}>

  const fileName = () => {
    const base = String(proposal.content?.coverTitle || proposal.service || "proposta");
    const slug = base.normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[^a-zA-Z0-9]+/g,"-").replace(/^-+|-+$/g,"").toLowerCase().slice(0,60) || "proposta";
    return `${slug}.pdf`;
  };

  const downloadPDF = async () => {
    if(!brandReady){ goSettings(); return; }
    const el = document.getElementById("wrap");
    if(!el || !window.html2pdf){ window.print(); return; }
    setPdfLoading(true);
    const prevRadius = el.style.borderRadius, prevShadow = el.style.boxShadow;
    el.style.borderRadius = "0"; el.style.boxShadow = "none";
    try{
      await window.html2pdf().set({
        margin:0,
        filename:fileName(),
        image:{type:"jpeg",quality:0.98},
        html2canvas:{scale:2,useCORS:true,backgroundColor:"#ffffff",scrollY:0},
        jsPDF:{unit:"mm",format:"a4",orientation:"portrait"},
        pagebreak:{mode:["avoid-all","css","legacy"]}
      }).from(el).save();
    }catch(e){ window.print(); }
    finally{ el.style.borderRadius = prevRadius; el.style.boxShadow = prevShadow; setPdfLoading(false); }
  };

  const pdfBtnStyle = !brandReady
    ? {background:"#fff",color:"#B45309",border:"1px solid #FCD34D",padding:"11px 20px",borderRadius:10,fontSize:14.5,fontWeight:700,cursor:"pointer"}
    : {...btnP,opacity:pdfLoading?.7:1,cursor:pdfLoading?"default":"pointer"};
  const pdfLabel = pdfLoading ? "Gerando…" : (brandReady ? "Baixar PDF" : "Configurar marca");
  const pdfIcon = brandReady ? "download" : "settings";

  return <div style={{padding:"20px clamp(16px,4vw,36px)"}}>
    {pdfLoading && <div className="noprint" style={{position:"fixed",inset:0,background:"rgba(11,27,63,.6)",backdropFilter:"blur(3px)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",zIndex:200,gap:16}}>
      <div className="spin" style={{borderColor:"rgba(255,255,255,.3)",borderTopColor:"#fff"}}/>
      <div style={{color:"#fff",fontWeight:700,fontSize:15}}>Gerando seu PDF…</div>
    </div>}

    <div className="noprint" style={{display:"flex",justifyContent:"space-between",marginBottom:14,flexWrap:"wrap",gap:10,alignItems:"center"}}>
      <button onClick={back} style={{...btnG,display:"inline-flex",alignItems:"center",gap:6}}><Icon n="chevron-left" s={16}/> Voltar</button>
      <div style={{display:"flex",alignItems:"center",gap:8,fontSize:13,color:C.textSec}}><Icon n="eye" s={15}/> {proposal.views||0} visualizações</div>
      <div style={{display:"flex",gap:10}}>
        <button onClick={()=>setShare(true)} className="hov" style={{...btnG,display:"inline-flex",alignItems:"center",gap:6}}><Icon n="share-2" s={16}/> Compartilhar</button>
        <button onClick={downloadPDF} disabled={pdfLoading} className="hov" style={{...pdfBtnStyle,display:"inline-flex",alignItems:"center",gap:7}}><Icon n={pdfIcon} c={brandReady?"#fff":"#B45309"} s={16}/> {pdfLabel}</button>
      </div>
    </div>

    {!brandReady && <div className="noprint" style={{background:"#FEF2F2",border:"1px solid #FECACA",borderRadius:14,padding:"15px 17px",marginBottom:18,display:"flex",alignItems:"flex-start",gap:12}}>
      <span style={{fontSize:18,lineHeight:1.2}}>⚠️</span>
      <div style={{flex:1}}>
        <div style={{fontSize:14.5,color:"#991B1B",fontWeight:800,marginBottom:3}}>Configure sua marca para baixar o PDF</div>
        <div style={{fontSize:13.5,color:"#B91C1C",lineHeight:1.55,marginBottom:11}}>Sem logo e nome da empresa, a proposta sai com "Sua Empresa" no lugar da sua marca. Leva 30 segundos e vale para todas as próximas propostas.</div>
        <button onClick={goSettings} className="hov" style={{background:"#DC2626",color:"#fff",border:"none",padding:"10px 17px",borderRadius:10,fontSize:13.5,fontWeight:700,cursor:"pointer",display:"inline-flex",alignItems:"center",gap:7}}>
          <Icon n="settings" c="#fff" s={15}/> Configurar minha marca
        </button>
      </div>
    </div>}

    {brandReady && <div className="noprint" style={{background:"#F3F1EA",border:"1px solid #CBD8D2",borderRadius:14,padding:"13px 17px",marginBottom:18,display:"flex",alignItems:"flex-start",gap:11}}>
      <Icon n="lightbulb" c={C.secondary} s={18}/>
      <span style={{fontSize:13.5,color:"#1B3A30",lineHeight:1.5}}><strong>Dica:</strong> baixe o PDF e envie o arquivo pelo WhatsApp ou e-mail. Passa muito mais profissional do que mandar um link.</span>
    </div>}

    <div id="wrap" style={{maxWidth:800,margin:"0 auto",background:"#fff",borderRadius:18,boxShadow:"0 12px 50px rgba(15,23,42,.13)",overflow:"hidden"}}>
      <Doc proposal={proposal} settings={settings}/>
    </div>

    {share && <div className="noprint" onClick={()=>setShare(false)} style={{position:"fixed",inset:0,background:"rgba(11,27,63,.55)",backdropFilter:"blur(3px)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
      <div onClick={e=>e.stopPropagation()} style={{background:"#14271D",borderRadius:20,padding:28,maxWidth:440,width:"100%",border:"1px solid #284036",boxShadow:"0 24px 70px rgba(0,0,0,.5)"}}>
        <h3 style={{margin:"0 0 16px",fontSize:18,fontWeight:800}}>Compartilhar proposta</h3>
        <div style={{background:"#F3F1EA",border:"1px solid #CBD8D2",borderRadius:10,padding:"11px 14px",marginBottom:16,display:"flex",gap:9,alignItems:"flex-start"}}>
          <Icon n="lightbulb" c={C.secondary} s={16}/>
          <p style={{color:"#1B3A30",fontSize:13,margin:0,lineHeight:1.5}}><strong>Recomendado:</strong> baixe o PDF e envie pelo WhatsApp. Muito mais profissional.</p>
        </div>
        <label style={lab}>Link da proposta</label>
        <div style={{display:"flex",gap:8,marginBottom:16}}>
          <input readOnly value={link} style={{...inp,fontSize:12.5}}/>
          <button onClick={copy} className="hov" style={{...btnP,whiteSpace:"nowrap",minWidth:92}}>{copied?"✓ Copiado":"Copiar"}</button>
        </div>
        <button onClick={()=>{ setShare(false); downloadPDF(); }} disabled={pdfLoading} className="hov" style={{...(brandReady?btnP:{background:"#fff",color:"#B45309",border:"1px solid #FCD34D",padding:"13px",borderRadius:10,fontSize:15,fontWeight:700,cursor:"pointer"}),width:"100%",marginBottom:10,display:"inline-flex",alignItems:"center",justifyContent:"center",gap:8,opacity:pdfLoading?.7:1}}>
          <Icon n={pdfIcon} c={brandReady?"#fff":"#B45309"} s={18}/> {brandReady?"Baixar PDF para enviar":"Configurar marca primeiro"}
        </button>
        <div style={{background:"#F0FDF4",border:"1px solid #BBF7D0",borderRadius:10,padding:"11px 14px",marginBottom:10,fontSize:13,color:"#166534",lineHeight:1.5,display:"flex",gap:8,alignItems:"flex-start"}}>
          <Icon n="check-circle" c="#16A34A" s={16}/> <span><strong>Enviar pelo WhatsApp:</strong> baixe o PDF, abra o WhatsApp, anexe o arquivo e envie.</span>
        </div>
        <button onClick={()=>setShare(false)} style={{...btnG,width:"100%",color:C.textSec,border:"none",fontSize:13}}>Fechar</button>
      </div>
    </div>}
  </div>;
}

function Doc({proposal,settings,compact}){
  const c=proposal.content||{};
  const brand=settings.brandColor||C.primary;
  const gold="#C39A63";
  const pad=compact?22:56;
  const company=settings.companyName||"Sua Empresa";
  const fmtDate=new Date(proposal.createdAt).toLocaleDateString("pt-BR",{day:"2-digit",month:"long",year:"numeric"});

  const Eyebrow=({children})=><div style={{display:"flex",alignItems:"center",gap:12,margin:compact?"26px 0 12px":"46px 0 18px"}}>
    <span style={{width:compact?16:22,height:2,background:gold,flexShrink:0,borderRadius:2}}/>
    <span style={{fontSize:compact?10.5:12,fontWeight:800,color:brand,letterSpacing:".14em",textTransform:"uppercase"}}>{children}</span>
  </div>;
  const Li=({items,mark})=><div style={{display:"flex",flexDirection:"column",gap:compact?9:12}}>{(items||[]).map((it,i)=><div key={i} style={{display:"flex",gap:12,alignItems:"flex-start"}}>{mark
      ? <span style={{width:compact?18:22,height:compact?18:22,borderRadius:"50%",background:`${C.success}15`,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0,marginTop:1}}><Icon n="check" c={C.success} s={compact?12:14}/></span>
      : <span style={{width:6,height:6,borderRadius:"50%",background:gold,marginTop:compact?7:8,flexShrink:0}}/>}
    <span style={{fontSize:compact?13.5:15.5,color:"#334155",lineHeight:1.7}}>{it}</span></div>)}</div>;

  return <div style={{background:"#fff",color:"#1A1C2E"}}>
    <div style={{position:"relative",background:`linear-gradient(150deg,#0E2019 0%,${brand} 55%,#1B3A30 100%)`,color:"#fff",padding:`${pad}px ${pad}px ${compact?pad:pad+10}px`,overflow:"hidden"}}>
      <div className="serif" style={{position:"absolute",top:compact?-44:-78,right:compact?-30:-50,fontSize:compact?170:300,fontWeight:900,lineHeight:1,color:"rgba(255,255,255,.05)",pointerEvents:"none",userSelect:"none"}}>{(company[0]||"P").toUpperCase()}</div>
      <div style={{position:"relative"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:compact?26:52,gap:12}}>
          {settings.logo
            ? <img src={settings.logo} style={{height:compact?26:38,maxWidth:compact?130:210,objectFit:"contain",borderRadius:7,background:"rgba(255,255,255,.96)",padding:"5px 9px"}}/>
            : <strong style={{fontSize:compact?15:19,letterSpacing:"-.2px"}}>{company}</strong>}
          <span style={{fontSize:compact?9.5:11,fontWeight:700,letterSpacing:".22em",textTransform:"uppercase",color:"rgba(255,255,255,.6)"}}>Proposta Comercial</span>
        </div>
        <span style={{display:"inline-block",padding:compact?"4px 12px":"6px 15px",background:"rgba(255,255,255,.12)",border:"1px solid rgba(255,255,255,.18)",borderRadius:100,fontSize:compact?10.5:12.5,fontWeight:600,marginBottom:compact?14:20,color:"rgba(255,255,255,.92)"}}>{proposal.template}</span>
        <h1 className="serif" style={{fontSize:compact?26:46,fontWeight:900,lineHeight:1.05,margin:0,letterSpacing:"-1.2px",maxWidth:680}}>{c.coverTitle||proposal.service}</h1>
        {c.coverSubtitle && <p style={{fontSize:compact?14:19,opacity:.82,marginTop:compact?12:16,marginBottom:0,fontWeight:400,maxWidth:580,lineHeight:1.5}}>{c.coverSubtitle}</p>}
        <div style={{height:1.5,background:`linear-gradient(90deg,${gold},transparent)`,margin:compact?"22px 0":"38px 0 26px",maxWidth:compact?240:420}}/>
        <div style={{display:"flex",gap:compact?28:56,flexWrap:"wrap",fontSize:compact?12:14}}>
          <div>
            <div style={{textTransform:"uppercase",letterSpacing:".1em",fontSize:compact?9.5:10.5,opacity:.6,fontWeight:700,marginBottom:5}}>Preparado para</div>
            <div style={{fontWeight:600,opacity:.95}}>{proposal.clientName||"—"}</div>
            {proposal.company && <div style={{opacity:.7,fontSize:compact?11.5:13,marginTop:1}}>{proposal.company}</div>}
          </div>
          <div>
            <div style={{textTransform:"uppercase",letterSpacing:".1em",fontSize:compact?9.5:10.5,opacity:.6,fontWeight:700,marginBottom:5}}>Data</div>
            <div style={{fontWeight:600,opacity:.95}}>{fmtDate}</div>
          </div>
        </div>
      </div>
    </div>

    <div style={{padding:`${compact?6:18}px ${pad}px ${pad}px`}}>
      {c.presentation && <><Eyebrow>Apresentação</Eyebrow>{String(c.presentation).split("\n").filter(Boolean).map((x,i)=><p key={i} style={{fontSize:compact?13.5:15.5,lineHeight:1.8,color:"#334155",margin:"0 0 12px"}}>{x}</p>)}</>}

      {c.objectives?.length>0 && <><Eyebrow>Objetivos</Eyebrow><Li items={c.objectives}/></>}

      {c.scope?.length>0 && <><Eyebrow>Escopo do projeto</Eyebrow><Li items={c.scope} mark/></>}

      {c.timeline?.length>0 && <><Eyebrow>Cronograma</Eyebrow><div style={{display:"flex",flexDirection:"column",gap:compact?10:12}}>{c.timeline.map((t,i)=><div key={i} style={{display:"flex",gap:16,padding:compact?"13px 15px":"17px 19px",background:"#F7F6F1",borderRadius:13,border:`1px solid ${C.border}`,borderLeft:`3px solid ${brand}`}}><div style={{minWidth:compact?70:104,flexShrink:0}}><div style={{fontWeight:800,fontSize:compact?13:14.5}}>{t.phase}</div><div style={{fontSize:compact?11:12.5,color:brand,fontWeight:700,marginTop:2}}>{t.duration}</div></div><div style={{fontSize:compact?13:14.5,color:"#475569",lineHeight:1.65}}>{t.description}</div></div>)}</div></>}

      {(c.investmentIntro||c.investmentItems?.length>0||c.investmentTotal) && <><Eyebrow>Investimento</Eyebrow>{c.investmentIntro && <p style={{fontSize:compact?13.5:15.5,lineHeight:1.75,color:"#334155",marginTop:0,marginBottom:16}}>{c.investmentIntro}</p>}<div style={{border:`1px solid ${C.border}`,borderRadius:14,overflow:"hidden",boxShadow:"0 2px 10px rgba(15,23,42,.04)"}}>{(c.investmentItems||[]).map((it,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",gap:14,padding:compact?"12px 16px":"15px 20px",borderBottom:`1px solid ${C.border}`,fontSize:compact?13:15}}><span style={{color:"#334155"}}>{it.item}</span><b style={{whiteSpace:"nowrap"}}>{it.value}</b></div>)}{c.investmentTotal && <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:compact?"14px 16px":"18px 20px",background:`linear-gradient(135deg,${brand}0f,${gold}12)`}}><span style={{fontWeight:700,fontSize:compact?13.5:15,color:"#0B1220"}}>Investimento total</span><span className="serif" style={{color:brand,fontSize:compact?18:24,fontWeight:900,letterSpacing:"-.5px"}}>{c.investmentTotal}</span></div>}</div></>}

      {c.benefits?.length>0 && <><Eyebrow>Benefícios</Eyebrow><div style={{display:"grid",gridTemplateColumns:compact?"1fr":"1fr 1fr",gap:compact?10:12}}>{c.benefits.map((b,i)=><div key={i} style={{display:"flex",gap:11,padding:compact?"12px 14px":"15px 17px",background:"#F7F6F1",borderRadius:12,border:`1px solid ${C.border}`}}><Icon n="check-circle" c={C.success} s={compact?16:18}/><span style={{fontSize:compact?13:14.5,color:"#334155",lineHeight:1.5}}>{b}</span></div>)}</div></>}

      {c.differentials?.length>0 && <><Eyebrow>Diferenciais</Eyebrow><Li items={c.differentials}/></>}

      {c.nextSteps?.length>0 && <><Eyebrow>Próximos passos</Eyebrow><div style={{display:"flex",flexDirection:"column",gap:compact?11:14}}>{c.nextSteps.map((s,i)=><div key={i} style={{display:"flex",gap:14,alignItems:"center"}}><div className="serif" style={{width:compact?30:38,height:compact?30:38,borderRadius:"50%",background:`linear-gradient(135deg,${brand},${C.accent})`,color:"#fff",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:800,fontSize:compact?14:17,flexShrink:0,boxShadow:`0 4px 12px ${brand}40`}}>{i+1}</div><span style={{fontSize:compact?13.5:15.5,color:"#334155",lineHeight:1.5}}>{s}</span></div>)}</div></>}

      {c.closing && <div style={{marginTop:compact?28:50,padding:compact?"22px 22px":"34px 34px",background:`linear-gradient(150deg,#0E2019,${brand})`,borderRadius:18,color:"#fff",position:"relative",overflow:"hidden"}}>
        <div style={{position:"absolute",top:-30,right:-20,width:compact?120:180,height:compact?120:180,borderRadius:"50%",background:"rgba(255,255,255,.04)",pointerEvents:"none"}}/>
        <div style={{position:"relative"}}>
          <p style={{fontSize:compact?14:17,lineHeight:1.75,margin:0,opacity:.95,fontWeight:400}}>{c.closing}</p>
          <div style={{marginTop:compact?20:28,paddingTop:compact?18:24,borderTop:"1px solid rgba(255,255,255,.16)"}}>
            <div style={{fontSize:compact?11:12,opacity:.6,marginBottom:7}}>Atenciosamente,</div>
            {settings.logo
              ? <img src={settings.logo} style={{height:compact?24:32,maxWidth:190,objectFit:"contain",borderRadius:6,background:"rgba(255,255,255,.96)",padding:"4px 8px",marginBottom:8}}/>
              : <div className="serif" style={{fontSize:compact?17:21,fontWeight:800,marginBottom:6}}>{company}</div>}
            <div style={{display:"flex",gap:compact?14:20,flexWrap:"wrap",fontSize:compact?12:13.5,opacity:.85,marginTop:6}}>
              {settings.email && <span style={{display:"inline-flex",alignItems:"center",gap:6}}><Icon n="mail" c="rgba(255,255,255,.7)" s={14}/>{settings.email}</span>}
              {settings.phone && <span style={{display:"inline-flex",alignItems:"center",gap:6}}><Icon n="phone" c="rgba(255,255,255,.7)" s={14}/>{settings.phone}</span>}
            </div>
          </div>
        </div>
      </div>}
    </div>

    <div style={{padding:compact?"14px 22px":"18px 56px",borderTop:`1px solid ${C.border}`,display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:8,background:"#FCFCFD"}}>
      <span style={{fontSize:compact?10.5:12,color:C.textSec,fontWeight:700}}>{company}</span>
      <span style={{fontSize:compact?10:11.5,color:"#94A3B8"}}>Proposta gerada em {fmtDate}</span>
    </div>
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
